# VMAgent scrape configuration
# Targets use localhost because all containers run with network_mode: host

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: gotogether
    env: production

scrape_configs:

  - job_name: vmagent
    static_configs:
      - targets: ["localhost:8429"]

  - job_name: victoriametrics
    static_configs:
      - targets: ["localhost:8428"]

  - job_name: cadvisor
    static_configs:
      - targets: ["localhost:8081"]
    metric_relabel_configs:
      # Keep only GoTogether-related containers + monitoring stack
      - source_labels: [container_label_com_docker_compose_service]
        regex: "(backend|frontend|tgbot|db|victoriametrics|loki|jaeger)"
        action: keep

  - job_name: node
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: postgres
    static_configs:
      - targets: ["localhost:9187"]

  - job_name: otel-collector
    static_configs:
      - targets: ["localhost:8888"]

  - job_name: backend
    static_configs:
      - targets: ["localhost:8080"]
    metrics_path: /metrics
