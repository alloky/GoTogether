apiVersion: 1

datasources:

  - name: VictoriaMetrics
    type: prometheus
    uid: victoriametrics
    access: proxy
    url: http://localhost:8428
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: jaeger

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://localhost:3100
    editable: false
    jsonData:
      derivedFields:
        # Clicking a trace_id in logs opens the trace in Jaeger
        - matcherRegex: "trace_id=([a-f0-9]{32})"
          name: TraceID
          url: "$${__value.raw}"
          datasourceUid: jaeger
          urlDisplayLabel: "Open in Jaeger"

  - name: Jaeger
    type: jaeger
    uid: jaeger
    access: proxy
    url: http://localhost:16686
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{job="$${__span.tags["service.name"]}"} |= "$${__trace.traceId}"'
      nodeGraph:
        enabled: true

  - name: Alertmanager
    type: alertmanager
    uid: alertmanager
    access: proxy
    url: http://localhost:9093
    editable: false
    jsonData:
      implementation: prometheus
