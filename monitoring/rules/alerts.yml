groups:

  # ─────────────────────────────────────────
  # CONTAINERS
  # ─────────────────────────────────────────
  - name: containers
    interval: 30s
    rules:

      - alert: ContainerDown
        expr: |
          time() - container_last_seen{
            container_label_com_docker_compose_service=~"backend|frontend|tgbot|db"
          } > 30
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.container_label_com_docker_compose_service }} is down"
          description: "Container has not been seen by cAdvisor for more than 30 seconds."

      - alert: ContainerRestartLoop
        expr: |
          increase(container_last_seen{
            container_label_com_docker_compose_service=~"backend|frontend|tgbot|db"
          }[5m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container_label_com_docker_compose_service }} is restarting frequently"
          description: "Container restarted more than 3 times in the last 5 minutes."

      - alert: ContainerHighCPU
        expr: |
          rate(container_cpu_usage_seconds_total{
            container_label_com_docker_compose_service=~"backend|frontend|tgbot|db"
          }[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.container_label_com_docker_compose_service }}"
          description: "Container CPU usage is {{ $value | humanize }}% for 5+ minutes."

      - alert: ContainerHighMemory
        expr: |
          (container_memory_usage_bytes{
            container_label_com_docker_compose_service=~"backend|frontend|tgbot|db"
          } / container_spec_memory_limit_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.container_label_com_docker_compose_service }}"
          description: "Container memory usage is {{ $value | humanize }}% of limit."

  # ─────────────────────────────────────────
  # HOST
  # ─────────────────────────────────────────
  - name: host
    interval: 60s
    rules:

      - alert: HostHighMemory
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage is high"
          description: "Host memory used: {{ $value | humanize }}%"

      - alert: HostDiskSpaceHigh
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
                / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host disk usage is high"
          description: "Disk used: {{ $value | humanize }}% on /"

      - alert: HostDiskSpaceCritical
        expr: |
          (1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"}
                / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})) * 100 > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Host disk almost full"
          description: "Disk used: {{ $value | humanize }}% — immediate action required."

      - alert: HostHighLoad
        expr: node_load5 > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High system load average"
          description: "5-minute load average: {{ $value }}"

  # ─────────────────────────────────────────
  # BACKEND (Go API)
  # These rules activate once /metrics is exposed by the backend
  # ─────────────────────────────────────────
  - name: backend
    interval: 30s
    rules:

      - alert: BackendHighErrorRate
        expr: |
          sum(rate(http_requests_total{job="backend", status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="backend"}[5m])) > 0.01
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Backend HTTP 5xx rate above 1%"
          description: "Error rate: {{ $value | humanizePercentage }}"

      - alert: BackendCriticalErrorRate
        expr: |
          sum(rate(http_requests_total{job="backend", status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="backend"}[5m])) > 0.05
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend HTTP 5xx rate above 5%"
          description: "Error rate: {{ $value | humanizePercentage }} — service may be degraded."

      - alert: BackendHighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(http_request_duration_seconds_bucket{job="backend"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backend P95 latency above 2s"
          description: "P95 latency: {{ $value | humanizeDuration }}"

      - alert: BackendNoTraffic
        expr: |
          sum(rate(http_requests_total{job="backend"}[10m])) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Backend received no HTTP requests for 10 minutes"
          description: "Possible crash or connectivity issue."

      - alert: BackendDBPoolHigh
        expr: |
          pgx_pool_acquired_connections{job="backend"}
          /
          pgx_pool_max_connections{job="backend"} > 0.9
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Backend DB connection pool above 90%"
          description: "Acquired connections: {{ $value | humanizePercentage }} of max pool size."

  # ─────────────────────────────────────────
  # TELEGRAM BOT
  # ─────────────────────────────────────────
  - name: tgbot
    interval: 30s
    rules:

      - alert: TgbotDown
        expr: |
          time() - container_last_seen{
            container_label_com_docker_compose_service="tgbot"
          } > 30
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Telegram bot container is down"
          description: "tgbot container has not been seen by cAdvisor for more than 30 seconds."

  # ─────────────────────────────────────────
  # POSTGRESQL
  # ─────────────────────────────────────────
  - name: postgres
    interval: 30s
    rules:

      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is unreachable"
          description: "postgres-exporter cannot connect to the database."

      - alert: PostgresConnectionsHigh
        expr: |
          pg_stat_activity_count / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL connections above 80% of max"
          description: "Active connections: {{ $value | humanizePercentage }} of max_connections."

      - alert: PostgresLongRunningQuery
        expr: |
          pg_stat_activity_max_tx_duration{datname="gotogether"} > 30
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL long-running query detected"
          description: "Query running for {{ $value | humanizeDuration }} in gotogether DB."

      - alert: PostgresDeadlocks
        expr: |
          increase(pg_stat_database_deadlocks{datname="gotogether"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL deadlock detected"
          description: "{{ $value }} deadlock(s) in the last 5 minutes."

      - alert: PostgresCheckpointsTooFrequent
        expr: |
          rate(pg_stat_bgwriter_checkpoints_req_total[5m]) > 0.5
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "PostgreSQL requested checkpoints too frequent"
          description: "Checkpoint request rate: {{ $value | humanize }}/s — consider increasing max_wal_size."

  # ─────────────────────────────────────────
  # MONITORING STACK SELF-HEALTH
  # ─────────────────────────────────────────
  - name: monitoring-health
    interval: 60s
    rules:

      - alert: VictoriaMetricsDown
        expr: absent(up{job="victoriametrics"}) == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "VictoriaMetrics is down"

      - alert: LokiDown
        expr: absent(up{job="loki"}) == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Loki is down — logs are not being collected"
